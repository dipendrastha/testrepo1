name: Build PR

on:
  pull_request_target:
    paths:
      - 'app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout PR merged code (fork included)
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Cache Next.js / build output (if exists)
      - name: Cache build
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            dist
            build
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build project
        run: npm run build